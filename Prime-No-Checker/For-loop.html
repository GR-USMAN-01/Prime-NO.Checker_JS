<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prime No Checker</title>
</head>
<body>
  
  <script>
    var num = 13;
    var count = 0;

    for (var i = 1; i<=num; i++){
      if (num % i == 0){
        count++;
      }
    }   

    if (count == 2){
      document.write("Prime Number")
    }
    else {
      document.write("Not Prime Number")
    }

  </script>
</body>
</html>
